services:
  systemd-tui-sandbox:
    build:
      context: .
      dockerfile: Dockerfile.sandbox
    container_name: systemd-tui-sandbox
    hostname: systemd-tui-sandbox
    privileged: true
    cgroup: host
    stop_signal: SIGRTMIN+3
    stdin_open: true
    tty: true
    tmpfs:
      - /run
      - /run/lock
      - /tmp
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
