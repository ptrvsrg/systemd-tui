name: CI Rust

on:
  pull_request:
  workflow_dispatch:

jobs:
  fmt:
    name: "Rust: formatting"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v6.0.2
      - name: Install rustfmt
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Cache Rust
        uses: Swatinem/rust-cache@v2.9.1
      - name: Check formatting
        run: cargo fmt --check

  build:
    name: "Rust: build"
    runs-on: ubuntu-latest
    needs: 
      - fmt
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v6.0.2
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache Rust
        uses: Swatinem/rust-cache@v2.9.1
      - name: Build release
        run: cargo build --release

  lint:
    name: "Rust: lint"
    runs-on: ubuntu-latest
    needs: 
      - build
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v6.0.2
      - name: Install clippy
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Cache Rust
        uses: Swatinem/rust-cache@v2.9.1
      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets --all-features -- -D warnings

  unit-test:
    name: "Rust: unit test"
    runs-on: ubuntu-latest
    needs: 
      - build
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v6.0.2
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache Rust
        uses: Swatinem/rust-cache@v2.9.1
      - name: Run tests
        run: cargo test --all-targets
