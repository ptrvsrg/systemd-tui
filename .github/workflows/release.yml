name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-rc[0-9]+"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2.9.1
      - name: Setup Zig
        uses: mlugg/setup-zig@v2.2.1
      - name: Install cargo-zigbuild
        run: cargo install cargo-zigbuild --locked
      - name: Setup syft
        uses: anchore/sbom-action/download-syft@v0.24.0
      - name: Install snapcraft
        run: |
          if command -v snapcraft >/dev/null 2>&1; then
            snapcraft --version
            exit 0
          fi

          if ! command -v snap >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y snapd
          fi

          sudo snap install snapcraft --classic
          snapcraft --version
      - name: Setup QEMU
        uses: docker/setup-qemu-action@v4.0.0
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0
      - name: Login to GHCR
        uses: docker/login-action@v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Detect RC tag
        id: tag
        run: |
          ref="${GITHUB_REF_NAME}"
          if echo "${ref}" | grep -Eiq -- '-rc[0-9]*$$'; then
            echo "is_rc=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_rc=false" >> "$GITHUB_OUTPUT"
          fi
      - name: GoReleaser Release
        if: steps.tag.outputs.is_rc == 'false'
        uses: goreleaser/goreleaser-action@v7.0.0
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: GoReleaser Draft Release (RC)
        if: steps.tag.outputs.is_rc == 'true'
        uses: goreleaser/goreleaser-action@v7.0.0
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean --draft
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
